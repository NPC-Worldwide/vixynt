# Example: Vision-language SFT fine-tuning config
# Usage:
#   1. python -m vixynt.prepare_dataset --config experiments/vision_sft_example.yaml
#   2. python -m vixynt.train --config experiments/vision_sft_example.yaml

# --- Dataset preparation ---
source_dir: data/raw_images
output_dir: data/prepared
caption_model: gemini-2.0-flash
caption_provider: gemini
num_augmentations: 3
use_resnet_augmentation: false
use_basic_augmentation: true
device: cpu
seed: 42

# --- Training ---
mode: vision_sft
manifest_path: data/prepared/manifest.json

# SFT hyperparameters
base_model: google/gemma-3-270m-it
format_style: gemma
num_epochs: 20
batch_size: 2
learning_rate: 3.0e-5
lora_r: 8
lora_alpha: 16
validation_split: 0.1
max_length: 512
