name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install --legacy-peer-deps

      - name: Build frontend
        run: |
          npm run build:renderer
          npm run build:electron
          npm run build:preload

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          echo "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}" | base64 --decode > build_cert.p12
          security create-keychain -p "$P12_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$P12_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import build_cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$P12_PASSWORD" build.keychain
          echo "CSC_LINK=$(pwd)/build_cert.p12" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=$P12_PASSWORD" >> $GITHUB_ENV

      - name: Build Electron app
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)   npx electron-builder --linux --publish=never ;;
            windows) npx electron-builder --win --publish=never ;;
            macos)   npx electron-builder --mac --publish=never ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Prepare files for upload
        id: prepare
        run: |
          mkdir -p upload
          VERSION="${{ steps.version.outputs.version }}"

          if [ "${{ runner.os }}" = "Linux" ]; then
            find release -name "*.deb" -exec cp {} upload/vixynt_${VERSION}_${{ matrix.arch }}.deb \;
            find release -name "*.AppImage" -exec cp {} upload/vixynt_${VERSION}_${{ matrix.arch }}.AppImage \;
            echo "gcs_path=linux-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" = "Windows" ]; then
            find release -maxdepth 1 -name "*.exe" -exec cp {} upload/vixynt_${VERSION}_${{ matrix.arch }}.exe \;
            echo "gcs_path=windows-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" = "macOS" ]; then
            find release -name "*.dmg" -exec cp {} upload/vixynt_${VERSION}_${{ matrix.arch }}.dmg \;
            find release -name "*.zip" -exec cp {} upload/vixynt_${VERSION}_${{ matrix.arch }}.zip \; 2>/dev/null || true
            echo "gcs_path=macos-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to Google Cloud Storage
        if: github.ref == 'refs/heads/main'
        run: |
          for file in upload/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              gsutil cp "$file" gs://vixynt-executables/${{ steps.prepare.outputs.gcs_path }}/"$filename"
              echo "Uploaded $filename to gs://vixynt-executables/${{ steps.prepare.outputs.gcs_path }}/"
            fi
          done
        shell: bash

      - name: Attach artifacts to GitHub Release (if exists)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            for file in upload/*; do
              if [ -f "$file" ]; then
                gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
              fi
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vixynt-${{ matrix.platform }}-${{ matrix.arch }}
          path: upload/*
          retention-days: 30

  update_manifest:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > manifest.json << EOF
          {
            "version": "$VERSION",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "downloads": {
              "linux-x64": "https://storage.googleapis.com/vixynt-executables/linux-x64/vixynt_${VERSION}_x64.deb",
              "linux-x64-appimage": "https://storage.googleapis.com/vixynt-executables/linux-x64/vixynt_${VERSION}_x64.AppImage",
              "windows-x64": "https://storage.googleapis.com/vixynt-executables/windows-x64/vixynt_${VERSION}_x64.exe",
              "macos-arm64": "https://storage.googleapis.com/vixynt-executables/macos-arm64/vixynt_${VERSION}_arm64.dmg"
            }
          }
          EOF
          gsutil cp manifest.json gs://vixynt-executables/manifest.json
          gsutil setmeta -h "Cache-Control:no-cache,max-age=0" gs://vixynt-executables/manifest.json

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create download links summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## New Vixynt build available!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download links:" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux x64 (deb):** https://storage.googleapis.com/vixynt-executables/linux-x64/vixynt_${VERSION}_x64.deb" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux x64 (AppImage):** https://storage.googleapis.com/vixynt-executables/linux-x64/vixynt_${VERSION}_x64.AppImage" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows x64:** https://storage.googleapis.com/vixynt-executables/windows-x64/vixynt_${VERSION}_x64.exe" >> $GITHUB_STEP_SUMMARY
          echo "- **macOS ARM64:** https://storage.googleapis.com/vixynt-executables/macos-arm64/vixynt_${VERSION}_arm64.dmg" >> $GITHUB_STEP_SUMMARY
