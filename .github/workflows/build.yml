name: Build and Release
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --legacy-peer-deps
      - run: npm run build:renderer
      - run: npm run build:electron
      - run: npm run build:preload
      - run: npx electron-builder --mac --publish=never
        env: { CSC_IDENTITY_AUTO_DISCOVERY: false }
      - uses: google-github-actions/auth@v2
        with: { credentials_json: ${{ secrets.GCS_SA_KEY }} }
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gsutil cp release/*.dmg gs://vixynt-releases/macos/ || true
          gsutil cp release/*.zip gs://vixynt-releases/macos/ || true
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --legacy-peer-deps
      - run: npm run build:renderer
      - run: npm run build:electron
      - run: npm run build:preload
      - run: npx electron-builder --win --publish=never
      - uses: google-github-actions/auth@v2
        with: { credentials_json: ${{ secrets.GCS_SA_KEY }} }
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gsutil cp release/*.exe gs://vixynt-releases/windows/ || true
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --legacy-peer-deps
      - run: npm run build:renderer
      - run: npm run build:electron
      - run: npm run build:preload
      - run: npx electron-builder --linux --publish=never
      - uses: google-github-actions/auth@v2
        with: { credentials_json: ${{ secrets.GCS_SA_KEY }} }
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gsutil cp release/*.deb gs://vixynt-releases/linux/ || true
          gsutil cp release/*.AppImage gs://vixynt-releases/linux/ || true
